<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>myco</title>
<style>
  :root {
    --blue: #0227b5;
    --ink: #fffdf7;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--blue);
    color: var(--ink);
    font-family: "Courier New", Courier, ui-monospace, monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    min-height: 100svh;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.35rem;
    text-align: center;
    padding: 2rem;
  }

  .logo {
    width: min(70vw, 420px);
    height: auto;
    display: block;
    margin: 0 auto;
  }

  h1 {
    position: absolute;
    width: 1px;
    height: 1px;
    overflow: hidden;
    clip: rect(0 0 0 0);
    white-space: nowrap;
  }

  p {
    margin: 0 auto;
    font-size: 0.95rem;
    max-width: 40ch;
  }

  p.status {
    margin: 0 auto;
  }

  a {
    color: inherit;
    text-decoration: underline;
    text-underline-offset: 4px;
  }

  a:hover {
    background: var(--ink);
    color: var(--blue);
    text-decoration: none;
  }

  footer {
    padding: 0 2rem 1.5rem;
    text-align: center;
    font-size: 0.92rem;
    font-family: inherit;
  }

  @media (max-width: 680px) {
    .logo {
      width: min(86vw, 380px);
    }
  }
</style>
</head>
<body>
  <main>
    <img class="logo" src="assets/myco-logo-white-trimmed.png" alt="Myco" width="1051" height="1040">
    <h1>Myco</h1>
    <p>A declarative language for reusable scientific models.</p>
    <p class="status">
      Status: I'm working on it.<br>
      Track progress <a href="https://github.com/rileyleff/myco">here</a>.
    </p>
  </main>
  <footer>Riley Leff &middot; <a href="mailto:rileyleff@gmail.com">rileyleff@gmail.com</a></footer>
</body>
</html>
